backend:
  name: github
  repo: Kanade-0721/my-website
  branch: main
  site_domain: https://my-website-a4a.pages.dev
  base_url: https://my-website-a4a.pages.dev
  auth_endpoint: /api/auth

local_backend: true

media_folder: "public/uploads"
public_folder: "/uploads"

publish_mode: editorial_workflow

collections:
  - name: "blog"
    label: "博客"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "简介", name: "description", widget: "text" }
      - label: "日期"
        name: "date"
        widget: "datetime"
        default: "{{now}}"
        date_format: "YYYY-MM-DD"
        time_format: "HH:mm"
        format: "YYYY-MM-DD HH:mm"
      - { label: "发布", name: "published", widget: "boolean", default: true }
      - { label: "标签", name: "tags", widget: "list", default: [] }
      - label: "封面图"
        name: "cover"
        widget: "image"
        required: false
        choose_url: false
      - label: "媒体"
        name: "media"
        widget: "object"
        collapsed: true
        fields:
          - label: "图片"
            name: "images"
            widget: "image"
            required: false
            default: []
            choose_url: false
            allow_multiple: true
            media_library:
              config:
                multiple: true
          - { label: "视频", name: "videos", widget: "list", default: [] }
          - { label: "音频", name: "audios", widget: "list", default: [] }
      - { label: "正文", name: "body", widget: "markdown" }

  - name: "study_sections"
    label: "笔记分区"
    label_singular: "笔记分区"
    folder: "src/content/study-sections"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "分区名称", name: "title", widget: "string" }
      - { label: "分区简介", name: "description", widget: "text" }
      - label: "创建日期"
        name: "date"
        widget: "datetime"
        default: "{{now}}"
        date_format: "YYYY-MM-DD"
        time_format: "HH:mm"
        format: "YYYY-MM-DD HH:mm"
      - { label: "排序", name: "order", widget: "number", required: false, value_type: "int", hint: "数字越小越靠前；不填则按日期排序。" }
      - { label: "发布", name: "published", widget: "boolean", default: true }
      - label: "封面图"
        name: "cover"
        widget: "image"
        required: false
        choose_url: false
      - { label: "说明", name: "body", widget: "markdown", required: false }

  - name: "study"
    label: "笔记更新"
    label_singular: "笔记更新"
    folder: "src/content/study"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "所属分区", name: "section", widget: "relation", collection: "study_sections", search_fields: ["title"], display_fields: ["title"], value_field: "{{slug}}" }
      - { label: "标题", name: "title", widget: "string" }
      - { label: "简介", name: "description", widget: "text" }
      - label: "日期"
        name: "date"
        widget: "datetime"
        default: "{{now}}"
        date_format: "YYYY-MM-DD"
        time_format: "HH:mm"
        format: "YYYY-MM-DD HH:mm"
      - { label: "发布", name: "published", widget: "boolean", default: true }
      - { label: "标签", name: "tags", widget: "list", default: [] }
      - label: "封面图"
        name: "cover"
        widget: "image"
        required: false
        choose_url: false
      - label: "媒体"
        name: "media"
        widget: "object"
        collapsed: true
        fields:
          - label: "图片"
            name: "images"
            widget: "image"
            required: false
            default: []
            choose_url: false
            allow_multiple: true
            media_library:
              config:
                multiple: true
          - { label: "视频", name: "videos", widget: "list", default: [] }
          - { label: "音频", name: "audios", widget: "list", default: [] }
      - { label: "正文", name: "body", widget: "markdown" }

  - name: "project_sections"
    label: "项目分区"
    label_singular: "项目分区"
    folder: "src/content/project-sections"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "项目名称", name: "title", widget: "string" }
      - { label: "项目简介", name: "description", widget: "text" }
      - label: "创建日期"
        name: "date"
        widget: "datetime"
        default: "{{now}}"
        date_format: "YYYY-MM-DD"
        time_format: "HH:mm"
        format: "YYYY-MM-DD HH:mm"
      - { label: "使用技术", name: "technologies", widget: "list", default: [] }
      - label: "项目状态"
        name: "status"
        widget: "select"
        default: "进行中"
        options:
          - "进行中"
          - "暂停"
          - "完成"
      - { label: "排序", name: "order", widget: "number", required: false, value_type: "int", hint: "数字越小越靠前；不填则按日期排序。" }
      - { label: "发布", name: "published", widget: "boolean", default: true }
      - label: "封面图"
        name: "cover"
        widget: "image"
        required: false
        choose_url: false
      - { label: "说明", name: "body", widget: "markdown", required: false }

  - name: "projects"
    label: "项目更新"
    label_singular: "项目更新"
    folder: "src/content/projects"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "所属项目", name: "section", widget: "relation", collection: "project_sections", search_fields: ["title"], display_fields: ["title"], value_field: "{{slug}}" }
      - { label: "标题", name: "title", widget: "string" }
      - { label: "简介", name: "description", widget: "text" }
      - label: "日期"
        name: "date"
        widget: "datetime"
        default: "{{now}}"
        date_format: "YYYY-MM-DD"
        time_format: "HH:mm"
        format: "YYYY-MM-DD HH:mm"
      - { label: "发布", name: "published", widget: "boolean", default: true }
      - { label: "标签", name: "tags", widget: "list", default: [] }
      - label: "封面图"
        name: "cover"
        widget: "image"
        required: false
        choose_url: false
      - label: "媒体"
        name: "media"
        widget: "object"
        collapsed: true
        fields:
          - label: "图片"
            name: "images"
            widget: "image"
            required: false
            default: []
            choose_url: false
            allow_multiple: true
            media_library:
              config:
                multiple: true
          - { label: "视频", name: "videos", widget: "list", default: [] }
          - { label: "音频", name: "audios", widget: "list", default: [] }
      - { label: "正文", name: "body", widget: "markdown" }
